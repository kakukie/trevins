version: '3.8'

services:
  trevins-nginx:
    image: nginx:1.25-alpine
    container_name: trevins-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/trevins.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - trevins-network

networks:
  trevins-network:
    external: true
